name: Bug report
description: Report a reproducible problem in Vane
labels:
  - bug
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include secrets, private keys, or confidential datasets.
        Security vulnerabilities should be reported privately using GitHub's security advisory flow.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Select the area that best matches the problem.
      options:
        - Python API
        - DuckDB or SQL execution
        - Distributed execution or Ray
        - AI or model integration
        - Build or installation
        - Documentation
        - Other or not sure
    validations:
      required: true

  - type: textarea
    attributes:
      label: What happened?
      description: Describe the problem and the behavior you expected instead.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction
      description: |
        Provide a minimal, self-contained script or SQL query that reproduces the issue.
        Use code blocks for code and output.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      description: Include OS, architecture, Python version, Vane version or commit, and whether Ray/distributed execution was enabled.
      placeholder: |
        OS:
        Architecture:
        Python:
        Vane:
        Ray:
        VANE_RUNNER:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Add logs, stack traces, or relevant configuration. Redact credentials before posting.
