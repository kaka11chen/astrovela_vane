name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-24.04
    outputs:
      run_full: ${{ steps.ci_scope.outputs.run_full }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine whether full CI is required
        id: ci_scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run_full=true" >> "$GITHUB_OUTPUT"
            exit
          fi

          if git diff --quiet --no-renames "$PR_BASE_SHA" "$PR_HEAD_SHA" --; then
            run_full=true
            echo "No changed files were detected; running full CI."
          elif git diff --quiet --no-renames "$PR_BASE_SHA" "$PR_HEAD_SHA" -- \
            . \
            ':(exclude,glob)**/*.md' \
            ':(exclude,glob).github/ISSUE_TEMPLATE/**' \
            ':(exclude,glob).github/PULL_REQUEST_TEMPLATE/**'; then
            run_full=false
            echo "Only Markdown or static GitHub templates changed; skipping package and native CI."
          else
            run_full=true
            echo "A product, build, dependency, or automation file changed; running full CI."
          fi
          echo "run_full=$run_full" >> "$GITHUB_OUTPUT"

  source-package:
    name: Source package (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build and validate source package
        run: |
          python -m pip install --upgrade build pip "tomli>=1.1; python_version < '3.11'"
          python -m build --sdist --outdir dist
          python scripts/check_release_artifacts.py dist/*.tar.gz

  native-fast-tests:
    name: Native build and fast tests (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg-archives
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            libtool \
            ninja-build \
            pkg-config \
            tar \
            unzip \
            zip

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore vcpkg binary cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-binary-v1-${{ runner.os }}-${{ runner.arch }}-x64-linux-${{ hashFiles('vcpkg.json') }}

      - name: Install pinned native dependencies
        run: bash scripts/bootstrap_vcpkg.sh

      - name: Install Python build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            build \
            "cmake>=3.29" \
            "ninja>=1.10" \
            "pybind11[global]>=3.0.0" \
            "scikit-build-core>=0.11.4" \
            packaging \
            pytest

      - name: Build and run native distributed tests
        if: matrix.python-version == '3.12'
        run: scripts/run_native_tests.sh "[distributed]"

      - name: Build release artifacts
        env:
          SKBUILD_BUILD_DIR: ${{ github.workspace }}/build
          SKBUILD_CMAKE_BUILD_TYPE: Release
        run: python -m build --sdist --wheel --no-isolation --outdir dist

      - name: Validate release artifacts
        run: python scripts/check_release_artifacts.py dist/*.tar.gz dist/*.whl

      - name: Install the built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Verify the base installation Quickstart outside the checkout
        env:
          # Keep this distributed smoke test within a standard 16 GB runner.
          VANE_FTE_TASK_HEAP_BYTES: "1073741824"
          VANE_UDF_TASK_HEAP_BYTES: "1073741824"
        run: |
          cd "$RUNNER_TEMP"
          env -u VANE_RUNNER python "$GITHUB_WORKSPACE/scripts/verify_base_install.py"

      - name: Run the base-installation release tests
        run: scripts/run_release_tests.sh

      - name: Upload validated artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-python-artifacts-${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error

  # Keep this as the stable branch-protection check; matrix jobs may be skipped.
  required-ci:
    name: Required CI
    if: ${{ always() }}
    needs:
      - changes
      - source-package
      - native-fast-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Verify CI results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUN_FULL: ${{ needs.changes.outputs.run_full }}
          SOURCE_PACKAGE_RESULT: ${{ needs.source-package.result }}
          NATIVE_TESTS_RESULT: ${{ needs.native-fast-tests.result }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Change classification did not succeed: $CHANGES_RESULT" >&2
            exit 1
          fi

          case "$RUN_FULL" in
            true)
              expected_result=success
              ;;
            false)
              expected_result=skipped
              ;;
            *)
              echo "Unexpected full CI decision: $RUN_FULL" >&2
              exit 1
              ;;
          esac

          if [[ "$SOURCE_PACKAGE_RESULT" != "$expected_result" ||
                "$NATIVE_TESTS_RESULT" != "$expected_result" ]]; then
            echo "Unexpected CI results: source-package=$SOURCE_PACKAGE_RESULT, native-fast-tests=$NATIVE_TESTS_RESULT" >&2
            exit 1
          fi

          echo "Required CI passed with full_ci=$RUN_FULL."
