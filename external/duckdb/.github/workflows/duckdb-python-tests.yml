name: duckdb-python tests

on:
  pull_request:
    paths:
      - 'duckdb-python/**'
  push:
    paths:
      - 'duckdb-python/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./duckdb-python
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run duckdb-python fast tests
        run: python -m pytest -q duckdb-python/tests/fast -q
